name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f practica4_P3/requirements.txt ]; then pip install -r practica4_P3/requirements.txt; fi

      - name: Ejecutar pruebas unitarias
        run: |
          python -m unittest discover -s practica4_P3 -p "test_*.py"
