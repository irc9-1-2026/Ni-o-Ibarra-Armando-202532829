<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Sistema</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-6">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-gray-800 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Monitor del Sistema</h1>
                <p class="text-sm text-gray-400 mt-1">Actualización automática cada 3 segundos</p>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg text-sm border border-gray-700">
                SO: <span id="os-name" class="font-semibold text-emerald-400">Cargando...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-medium text-gray-300">Uso de CPU</h2>
                    <span id="cpu-text" class="text-2xl font-bold text-blue-400">0%</span>
                </div>
                <div class="w-full bg-gray-700 h-4 rounded-full overflow-hidden">
                    <div id="cpu-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-medium text-gray-300">Memoria RAM</h2>
                    <span id="mem-text" class="text-2xl font-bold text-purple-400">0%</span>
                </div>
                <div class="w-full bg-gray-700 h-4 rounded-full overflow-hidden">
                    <div id="mem-bar" class="bg-purple-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-lg overflow-hidden">
            <div class="p-6 border-b border-gray-700">
                <h2 class="text-xl font-bold text-white">Top Procesos por CPU</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-700/50 text-gray-300 text-sm uppercase tracking-wider">
                            <th class="p-4 font-semibold">PID</th>
                            <th class="p-4 font-semibold">Nombre del Proceso</th>
                            <th class="p-4 font-semibold text-right">Uso de CPU</th>
                        </tr>
                    </thead>
                    <tbody id="procesos-tabla" class="divide-y divide-gray-700">
                        <tr>
                            <td colspan="3" class="p-8 text-center text-gray-500">Esperando datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function actualizarDashboard() {
            try {
                const respuesta = await fetch('/datos');
                if (!respuesta.ok) throw new Error('Error en la respuesta');
                
                const datos = await respuesta.json();

                document.getElementById('os-name').textContent = datos.os;
                document.getElementById('cpu-text').textContent = `${datos.cpu}%`;
                document.getElementById('cpu-bar').style.width = `${datos.cpu}%`;
                document.getElementById('mem-text').textContent = `${datos.memoria}%`;
                document.getElementById('mem-bar').style.width = `${datos.memoria}%`;

                const tabla = document.getElementById('procesos-tabla');
                tabla.innerHTML = ''; 

                datos.procesos.forEach(p => {
                    const fila = document.createElement('tr');
                    fila.className = "hover:bg-gray-700/30 transition-colors";
                    fila.innerHTML = `
                        <td class="p-4 text-gray-400 font-mono text-sm">${p.pid}</td>
                        <td class="p-4 font-medium text-gray-200">${p.name}</td>
                        <td class="p-4 text-right text-emerald-400 font-semibold">${p.cpu_percent}%</td>
                    `;
                    tabla.appendChild(fila);
                });
            } catch (error) {
                console.error("Error al actualizar:", error);
            }
        }

        actualizarDashboard();
        setInterval(actualizarDashboard, 3000);
    </script>
</body>
</html>
