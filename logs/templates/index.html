<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista previa del dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #2e7d32;
            font-size: 28px;
            font-weight: normal;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px 0;
            font-size: 16px;
            border: none;
            border-bottom: 1px solid #ccc;
            outline: none;
            box-sizing: border-box;
            background: transparent;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-bottom: 2px solid #2e7d32;
        }
        button {
            background: none;
            border: none;
            color: #0066cc;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 0;
            display: block;
            margin-top: 20px;
            text-align: left;
        }
        button:hover {
            text-decoration: underline;
        }
        #resultado {
            margin-top: 30px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 4px;
            display: none;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
        }
        .error {
            color: #cc0000;
            background-color: #fdeaea !important;
        }
    </style>
</head>
<body>

    <h1>Vista previa del dashboard</h1>

    <form id="form-analizar">
        <div class="form-group">
            <label for="host">HOST</label>
            <input type="text" id="host" value="{{ host }}" placeholder="ej. 192.168.1.10" required>
        </div>

        <div class="form-group">
            <label for="usuario">USUARIO</label>
            <input type="text" id="usuario" value="{{ usuario }}" placeholder="ej. admin" required>
        </div>

        <div class="form-group">
            <label for="password">CONTRASEÑA</label>
            <input type="password" id="password" required>
        </div>

        <div class="form-group">
            <label for="ruta_remota">RUTA DEL LOG REMOTO</label>
            <input type="text" id="ruta_remota" value="{{ ruta_remota }}" required>
        </div>

        <button type="submit">Conectar y analizar</button>
    </form>

    <pre id="resultado"></pre>

    <script>
        document.getElementById('form-analizar').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue

            const btn = e.target.querySelector('button');
            const contenedorResultado = document.getElementById('resultado');

            // Recolectar datos del formulario
            const datos = {
                host: document.getElementById('host').value.trim(),
                usuario: document.getElementById('usuario').value.trim(),
                password: document.getElementById('password').value,
                ruta_remota: document.getElementById('ruta_remota').value.trim()
            };

            // Efecto visual de carga simple
            btn.disabled = true;
            btn.innerText = 'Analizando...';
            contenedorResultado.style.display = 'none';
            contenedorResultado.classList.remove('error');

            try {
                // Petición POST asíncrona enviando JSON
                const respuesta = await fetch('/analizar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datos)
                });

                const cuerpo = await respuesta.json();

                if (!respuesta.ok) {
                    // Si el servidor devolvió un error (400, 401, 500...)
                    throw new Error(cuerpo.error || 'Ocurrió un error inesperado');
                }

                // Renderizar el reporte JSON formateado en pantalla
                contenedorResultado.textContent = JSON.stringify(cuerpo, null, 2);
                contenedorResultado.style.display = 'block';

            } catch (err) {
                // Mostrar errores de conexión o del backend
                contenedorResultado.textContent = `Error: ${err.message}`;
                contenedorResultado.classList.add('error');
                contenedorResultado.style.display = 'block';
            } finally {
                // Restaurar el botón
                btn.disabled = false;
                btn.innerText = 'Conectar y analizar';
            }
        });
    </script>
</body>
</html>
