version: '3.8'

services:

  flask-app:
    build: .
    container_name: dashboard-app
    restart: always
    networks:
      - red-interna

  nginx:
    image: nginx:alpine
    container_name: dashboard-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask-app
    networks:
      - red-interna

networks:
  red-interna:
    driver: bridge